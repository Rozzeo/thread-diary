// A subtle paper-grain SVG used as the body background.
const PAPER_GRAIN = `url("data:image/svg+xml,%3Csvg viewBox='0 0 240 240' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.24 0 0 0 0 0.18 0 0 0 0 0.14 0 0 0 0.07 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")`;

// Format a Date as "Sunday, April 19th".
function formatDate(d) {
  const dayName = d.toLocaleDateString('en-US', { weekday: 'long' });
  const monthName = d.toLocaleDateString('en-US', { month: 'long' });
  const day = d.getDate();
  const suffix =
    (day % 10 === 1 && day !== 11) ? 'st' :
    (day % 10 === 2 && day !== 12) ? 'nd' :
    (day % 10 === 3 && day !== 13) ? 'rd' : 'th';
  return `${dayName}, ${monthName} ${day}${suffix}`;
}

function formatShort(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

<script type="text/babel">
// Coach: wraps window.claude.complete with a mock fallback.

const COACH_PROMPT = `You are a warm, adaptive English-writing coach for a personal journal. A learner has written a diary entry. Respond with a brief encouragement, then provide corrections adapted to their apparent level.

Rules:
1. Lead with one genuine, specific thing the user did well (1 short sentence).
2. Grammar: 2-4 meaningful errors. If none, return an empty list.
3. Vocabulary: 3-4 useful words the user used or could have used. Include IPA.
4. Style: 1-3 more-native phrasings. Frame as options, never corrections.
5. Detect dominant mood: calm, warm, tired, melancholy, or joyful.
6. Detect level (A2, B1, B2, C1).

Respond with ONLY this JSON (no markdown, no prose):
{
  "encouragement": "string (one sentence)",
  "grammar": [{ "original": "...", "suggested": "...", "explanation": "..." }],
  "vocabulary": [{ "word": "...", "ipa": "...", "definition": "...", "example": "..." }],
  "style": [{ "original": "...", "suggested": "...", "note": "..." }],
  "detected_mood": "calm|warm|tired|melancholy|joyful",
  "detected_level": "A2|B1|B2|C1"
}`;

async function geminiComplete(prompt) {
  const key = localStorage.getItem('thread:gemini_key') || '';
  if (!key) return null;
  if (location.protocol === 'file:') {
    throw new Error('FILE_PROTOCOL');
  }
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key=${key}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }),
    }
  );
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `HTTP ${res.status}`);
  }
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

async function runCoach(entry) {
  try {
    const text = await geminiComplete(
      `${COACH_PROMPT}\n\n---\n\nDiary entry:\n${entry}\n\n---\n\nReturn only the JSON object.`
    );
    if (!text) {
      await new Promise(r => setTimeout(r, 900));
      return { ...window.mockFeedback(entry), _source: 'mock' };
    }
    const cleaned = String(text).replace(/^```json\s*/i, '').replace(/```\s*$/i, '').trim();
    return { ...JSON.parse(cleaned), _source: 'gemini' };
  } catch (e) {
    console.warn('coach failed:', e.message);
    const isCorsError = e.message === 'FILE_PROTOCOL' || e.message.includes('fetch');
    return { ...window.mockFeedback(entry), _source: 'mock', _error: isCorsError ? 'file_protocol' : e.message };
  }
}

async function runPhraseGatherer(title) {
  try {
    const text = await geminiComplete(
      `Given the work "${title}", generate 7 signature phrases, vocabulary items, or idioms that capture its register, era, and tone. Prioritize phrases a learner could use in their own diary. Avoid proper nouns specific to the plot.\nReturn ONLY valid JSON: { "phrases": [{ "phrase": "...", "context": "brief note" }] }`
    );
    if (!text) {
      await new Promise(r => setTimeout(r, 700));
      return [
        { phrase: 'a quiet stretch of afternoon', context: 'calm pacing' },
        { phrase: 'what little was left to say', context: 'understated emotion' },
        { phrase: "keeping one's own counsel", context: 'reserved character' },
        { phrase: 'the long slow hour before dusk', context: 'atmospheric' },
        { phrase: 'to make do with what remained', context: 'modest resilience' },
        { phrase: 'half in a dream', context: 'dreamlike tone' },
        { phrase: 'a small mercy', context: 'gentle gratitude' },
      ];
    }
    const cleaned = String(text).replace(/^```json\s*/i, '').replace(/```\s*$/i, '').trim();
    return JSON.parse(cleaned).phrases || [];
  } catch (e) {
    return [];
  }
}

Object.assign(window, { runCoach, runPhraseGatherer });

</script>
<script type="text/babel">
// Nudges: gentle follow-up prompts that surface while writing to help the user
// keep going. Curated pools by "stage" (blank / short / mid / long) + a fallback
// async enrichment via window.claude.complete that picks contextually relevant
// nudges based on what they've written.

const NUDGE_POOLS = {
  // Shown when the page is empty — warm-ups.
  blank: [
    'Start with a color you saw today.',
    'One sound from this morning — what was it?',
    'Begin mid-sentence, as if continuing a thought.',
    'Name the first small thing that surprised you.',
    'Who did you think about today?',
    'What did the light look like?',
    'A smell you noticed, even for a second.',
  ],
  // 1–20 words — help the writer expand.
  short: [
    'And then what happened?',
    'Say more about that.',
    'Where were you when this started?',
    'What did your body feel like in that moment?',
    'Was anyone else there?',
    'Keep going — no need to be careful.',
    'What would a camera have seen?',
  ],
  // 20–80 words — deepen the reflection.
  mid: [
    'What did you almost write, but didn\'t?',
    'Why do you think it stayed with you?',
    'Is this familiar, or new?',
    'What would you tell a friend about this?',
    'Any part of this you\'re avoiding?',
    'Does this remind you of something older?',
    'One detail, as specific as possible.',
  ],
  // 80+ words — steer toward closing gestures.
  long: [
    'If today had a title, what would it be?',
    'What\'s one sentence you\'d underline?',
    'What do you want tomorrow to know?',
    'A small thing you\'re grateful for.',
    'End on an image, not a conclusion.',
    'What didn\'t you notice until now?',
  ],
};

function stageFor(text) {
  const n = text.trim() ? text.trim().split(/\s+/).length : 0;
  if (n === 0)   return 'blank';
  if (n < 20)    return 'short';
  if (n < 80)    return 'mid';
  return 'long';
}

function pickNudge(text, avoid = []) {
  const pool = NUDGE_POOLS[stageFor(text)];
  const available = pool.filter(p => !avoid.includes(p));
  const list = available.length ? available : pool;
  return list[Math.floor(Math.random() * list.length)];
}

// Optional AI-backed contextual nudge. Returns a single short string.
// Falls back to a pool pick if the helper is unavailable or fails.
async function contextualNudge(text) {
  const stage = stageFor(text);
  if (!window.claude || typeof window.claude.complete !== 'function' || stage === 'blank') {
    return pickNudge(text);
  }
  try {
    const out = await window.claude.complete(
      `You are a gentle journaling coach. The writer has this draft so far:

"""
${text.slice(0, 800)}
"""

Offer ONE short follow-up question or invitation (max 10 words) that will help them keep writing. Do not moralize. Do not repeat their words verbatim. No quotes, no emojis, no preamble. Just the question.`
    );
    const line = String(out || '').trim().replace(/^["'\s]+|["'\s]+$/g, '');
    if (line && line.length <= 90) return line;
    return pickNudge(text);
  } catch {
    return pickNudge(text);
  }
}

Object.assign(window, { NUDGE_POOLS, stageFor, pickNudge, contextualNudge });

</script>
<script type="text/babel">
// Writer screen — the main diary composition + feedback view.
const { useState, useEffect, useMemo, useRef } = React;

function Writer({ theme, onOpenEntry }) {
  const { paper, paperAlt, paperWarm, accent, accentDeep } = theme;
  const ink = window.INK;

  const [entry, setEntry] = useState('');
  const [mood, setMood] = useState(null);
  const [feedback, setFeedback] = useState(null);
  const [savedEntry, setSavedEntry] = useState(null);
  const [loading, setLoading] = useState(false);
  const [planted, setPlanted] = useState(() => {
    try { return JSON.parse(localStorage.getItem('thread:planted') || '[]'); } catch { return []; }
  });
  const [filmOpen, setFilmOpen] = useState(false);
  const [filmTitle, setFilmTitle] = useState('');
  const [phrases, setPhrases] = useState([]);
  const [phrasesLoading, setPhrasesLoading] = useState(false);

  const today = useMemo(() => new Date(), []);
  const [prompt] = useState(
    () => window.OPENING_PROMPTS[Math.floor(Math.random() * window.OPENING_PROMPTS.length)]
  );

  // ── Nudge state ──────────────────────────────
  const [nudge, setNudge] = useState(null);       // current nudge string or null
  const [nudgeHistory, setNudgeHistory] = useState([]);
  const [nudgeDismissed, setNudgeDismissed] = useState(false);
  const [idleTick, setIdleTick] = useState(0);
  const lastTypedRef = useRef(Date.now());
  const lastStageRef = useRef('blank');

  // Track typing pauses
  useEffect(() => {
    lastTypedRef.current = Date.now();
    setNudgeDismissed(false); // typing = user wants help again if idle comes back
  }, [entry]);

  // Idle tick — fires every 1.2s to check if user has paused
  useEffect(() => {
    if (hasFeedback) return;
    const id = setInterval(() => setIdleTick(t => t + 1), 1200);
    return () => clearInterval(id);
  }, [hasFeedback]);

  // Decide when to show a nudge
  useEffect(() => {
    if (hasFeedback || nudgeDismissed) return;
    const idleMs = Date.now() - lastTypedRef.current;
    const stage = window.stageFor(entry);
    const stageChanged = stage !== lastStageRef.current;

    // Trigger: either stage changed (crossed 20/80-word threshold) OR user idle >6s
    if (!nudge && (stageChanged || idleMs > 6000)) {
      lastStageRef.current = stage;
      const pick = window.pickNudge(entry, nudgeHistory);
      setNudge(pick);
      setNudgeHistory(h => [...h.slice(-4), pick]);
    }
  }, [idleTick, entry, hasFeedback, nudge, nudgeDismissed, nudgeHistory]);

  const refreshNudge = async () => {
    // Try for an AI-backed contextual nudge if user has written something
    setNudge('__loading__');
    const next = entry.trim().split(/\s+/).length > 8
      ? await window.contextualNudge(entry)
      : window.pickNudge(entry, nudgeHistory);
    setNudge(next);
    setNudgeHistory(h => [...h.slice(-4), next]);
  };

  const dismissNudge = () => {
    setNudge(null);
    setNudgeDismissed(true);
  };

  const hasFeedback = feedback && savedEntry;

  const wordCount = entry.trim() ? entry.trim().split(/\s+/).length : 0;

  const handleSave = async () => {
    if (!entry.trim()) return;
    setLoading(true);
    try {
      const parsed = await window.runCoach(entry);
      setFeedback(parsed);
      setSavedEntry(entry);
      if (!mood && parsed.detected_mood) setMood(parsed.detected_mood);
    } finally {
      setLoading(false);
    }
  };

  const handlePlant = (item) => {
    if (planted.find(p => p.word === item.word)) return;
    const next = [...planted, { ...item, plantedAt: Date.now() }];
    setPlanted(next);
    localStorage.setItem('thread:planted', JSON.stringify(next));
  };

  const plantedWords = planted.map(p => p.word);

  const handleNew = () => {
    setEntry(''); setMood(null); setFeedback(null); setSavedEntry(null);
  };

  const handleGenerate = async () => {
    if (!filmTitle.trim()) return;
    setPhrasesLoading(true);
    try {
      const result = await window.runPhraseGatherer(filmTitle);
      setPhrases(result);
    } finally {
      setPhrasesLoading(false);
    }
  };

  return (
    <div className="screen" data-screen-label="01 Write">
      {/* Date */}
      <div style={{ textAlign: 'center', marginBottom: 8 }}>
        <div style={{ fontFamily: "'Caveat', cursive", fontSize: 26, color: ink.soft, letterSpacing: '0.01em' }}>
          {window.formatDate(today)}
        </div>
      </div>
      <div style={{ marginBottom: 28 }}>
        <window.HandDivider color={accent} width={140} />
      </div>

      {/* inspired-by pill */}
      {!hasFeedback && !filmOpen && (
        <div style={{ textAlign: 'right', marginBottom: 14 }}>

        </div>
      )}

      {filmOpen && !hasFeedback && (
        <FilmBookPanel

          title={filmTitle} setTitle={setFilmTitle}

      {!hasFeedback ? (

              }}
            />
          </div>
          <NudgeBubble
            nudge={nudge}
            theme={theme}
            onDismiss={dismissNudge}
            onRefresh={refreshNudge}
          />
          <style>{`
            .thread-textarea::placeholder { color: ${ink.faint}; font-style: italic; opacity: 0.75; }

          <div style={{ textAlign: 'right', fontFamily: "'Caveat', cursive", fontSize: 16, color: ink.faint, marginTop: 4 }}>
            {wordCount > 0 && `${wordCount} word${wordCount === 1 ? '' : 's'}`}
          </div>

          <div style={{ marginTop: 30, textAlign: 'center' }}>
            <div style={{ fontFamily: "'Caveat', cursive", fontSize: 17, color: ink.soft, marginBottom: 12 }}>

            <div style={{ display: 'flex', justifyContent: 'center', gap: 24, alignItems: 'flex-start' }}>
              {window.MOODS.map(m => {
                const selected = mood === m.id;
                const color = window.MOOD_COLORS[m.id];

                    }}>
                    <div style={{
                      width: selected ? 22 : 16, height: selected ? 22 : 16, borderRadius: '50%',
                      background: color,
                      border: selected ? `2px solid ${ink.deep}` : `1px solid ${ink.faint}`,
                      boxShadow: selected ? `0 0 0 3px ${color}33` : 'none',
                      transition: 'all 0.25s',
                    }}/>
                    <span style={{ fontFamily: "'Caveat', cursive", fontSize: 14, color: selected ? ink.deep : ink.faint }}>
                      {m.label}
                    </span>
                  </button>

              })}
            </div>
          </div>

          <div style={{ marginTop: 36, textAlign: 'center' }}>
            <button
              onClick={handleSave}
              disabled={loading || !entry.trim()}
              style={{
                fontFamily: "'Lora', serif", fontStyle: 'italic', fontSize: 17,

                background: 'transparent', border: 'none',

                padding: '8px 24px', letterSpacing: '0.02em',

              }
            </button>
            {loading && <div style={{ marginTop: 12 }}><window.HandDivider width={80} color={accent} /></div>}
          </div>
        </>
      ) : (
        <FeedbackView
          theme={theme}
          entry={savedEntry} mood={mood} feedback={feedback}
          planted={plantedWords} onPlant={handlePlant}
          onNew={handleNew}
        />
      )}
    </div>
  );
}

<script type="text/babel">
// Calendar screen — a monthly mood map + list of recent entries.

function CalendarScreen({ theme, entries, onOpenEntry }) {
  const { accent, accentDeep, paper, paperWarm } = theme;
  const ink = window.INK;
  const today = new Date();
  const year  = today.getFullYear();
  const month = today.getMonth();
  const first = new Date(year, month, 1);
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const leading = first.getDay(); // Sun=0

  const byKey = React.useMemo(() => {
    const m = new Map();
    entries.forEach(e => m.set(window.dateKey(e.date), e));
    return m;
  }, [entries]);

  const monthLabel = today.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  const recent = [...entries].sort((a,b) => b.date - a.date).slice(0, 6);

  return (
    <div className="screen" data-screen-label="02 Calendar">
      <div style={{ textAlign: 'center', marginBottom: 8 }}>
        <div style={{ fontFamily: "'Caveat', cursive", fontSize: 28, color: ink.deep }}>

      </div>

        <window.HandDivider color={accent} width={140} />

            const day = idx + 1;
            const d = new Date(year, month, day);

            const e = byKey.get(k);
            const isToday = day === today.getDate();
            const hasEntry = !!e;

              <button key={day}

              >

                  color: isToday ? accentDeep : (hasEntry ? ink.deep : ink.faint),
                  fontWeight: isToday ? 600 : 400,

                  {day}

                {hasEntry && (
                  <div style={{
                    width: 8, height: 8, borderRadius: '50%',

            </div>

        <div style={{ fontFamily: "'Caveat', cursive", fontSize: 20, color: ink.deep, marginBottom: 12 }}>

          {recent.map((e, i) => (
            <button key={i} onClick={() => onOpenEntry(e)}

function GardenSprout({ word, delay, onClick }) {
  const ink = window.INK;
  return (

function SproutLarge() {
  // Slightly varied sprout — uses a deterministic tilt so each feels hand-placed
  const tilt = ((Math.random() * 14) - 7).toFixed(1);
  return (
    <svg width="46" height="46" viewBox="0 0 46 46" fill="none"
      style={{ transform: `rotate(${tilt}deg)` }}>
      {/* stem */}
      <path d="M23 42 V 22" stroke="#6F8558" strokeWidth="1.6" strokeLinecap="round" />
      {/* left leaf */}
      <path d="M23 26 Q 12 22, 10 10 Q 20 14, 23 26 Z" fill="#96A97E" fillOpacity="0.35" stroke="#6F8558" strokeWidth="1.2" strokeLinejoin="round" />
      {/* right leaf */}
      <path d="M23 23 Q 34 19, 36 7 Q 26 11, 23 23 Z" fill="#96A97E" fillOpacity="0.35" stroke="#6F8558" strokeWidth="1.2" strokeLinejoin="round" />
      {/* bud */}
      <circle cx="23" cy="22" r="1.4" fill="#B57E72" />
    </svg>
  );

function WordModal({ word, theme, onClose }) {
  const { paper, paperWarm, accent, accentDeep } = theme;
  const ink = window.INK;
  return (
    <div onClick={onClose}
      style={{
        position: 'fixed', inset: 0, background: 'rgba(61,46,38,0.25)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        padding: 24, zIndex: 50, animation: 'fadeIn 0.2s ease-out',
      }}>
      <div onClick={e => e.stopPropagation()}
        style={{
          background: paper, border: `1.5px dashed ${accent}`, borderRadius: 3,
          padding: '28px 28px 26px', maxWidth: 420, width: '100%',
          position: 'relative', boxShadow: '0 10px 40px rgba(61,46,38,0.2)',
          animation: 'fadeInUp 0.28s ease-out',
        }}>
        <window.StitchedCorners color={accent} />
        <button onClick={onClose}
          style={{
            position: 'absolute', top: 12, right: 14,
            background: 'transparent', border: 'none', cursor: 'pointer',
            color: ink.faint, fontSize: 18,
          }}>✕</button>

        <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 12 }}>
          <SproutLarge />
        </div>
        <div style={{ textAlign: 'center' }}>
          <div style={{ fontFamily: "'Lora', serif", fontSize: 24, fontWeight: 600, color: ink.deep }}>
            {word.word}
          </div>
          {word.ipa && (
            <div style={{ fontFamily: "'Lora', serif", fontSize: 14, fontStyle: 'italic', color: ink.faint, marginTop: 3 }}>
              /{word.ipa}/
            </div>
          )}
        </div>
        <div style={{ marginTop: 16 }}>
          <window.HandDivider color={accent} width={80} />
        </div>
        <div style={{ marginTop: 14, fontFamily: "'Lora', serif", fontSize: 15, color: ink.soft, lineHeight: 1.6, textAlign: 'center' }}>
          {word.definition}
        </div>
        {word.example && (
          <div style={{
            marginTop: 14, padding: '12px 14px',
            background: paperWarm, borderLeft: `2px solid ${accent}`,
            fontFamily: "'Lora', serif", fontStyle: 'italic', fontSize: 14, color: ink.deep,
            lineHeight: 1.55,
          }}>
            "{word.example}"
          </div>
        )}
        {word.plantedAt && (
          <div style={{
            marginTop: 16, textAlign: 'center',
            fontFamily: "'Caveat', cursive", fontSize: 14, color: ink.faint,
          }}>
            planted {daysSince(word.plantedAt)}
          </div>
        )}
      </div>
    </div>
  );
}

function daysSince(ts) {
  const now = Date.now();
  const days = Math.floor((now - ts) / 86400000);
  if (days <= 0) return 'today';
  if (days === 1) return 'yesterday';
  if (days < 7) return `${days} days ago`;
  if (days < 14) return 'a week ago';
  if (days < 30) return `${Math.floor(days/7)} weeks ago`;
  return `${Math.floor(days/30)} months ago`;
}

function EmptyGarden({ theme }) {
  const ink = window.INK;
  return (
    <div style={{

        color: ink.faint, maxWidth: 320, margin: '10px auto 0', lineHeight: 1.6,
      }}>
        Write an entry, then tap "plant in garden" on any word the coach surfaces.
        Your garden grows as you do.
      </div>
    </div>
  );
}

<script type="text/babel">
// App shell: nav + screen routing + tweak state.

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "cream",
  "accent": "kraft",
  "displayFont": "Caveat"
}/*EDITMODE-END*/;

function App() {
  const [config, setConfig] = React.useState(TWEAK_DEFAULTS);
  const [screen, setScreen] = React.useState('write');
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  const [readerEntry, setReaderEntry] = React.useState(null);

  // Entries = seed + any saved local
  const [entries] = React.useState(window.SEED_ENTRIES);
  const [planted, setPlanted] = React.useState(() => {
    try {
      const stored = JSON.parse(localStorage.getItem('thread:planted') || 'null');
      return stored || window.SEED_PLANTED;
    } catch { return window.SEED_PLANTED; }
  });

  // Listen to storage for planted changes from Writer
  React.useEffect(() => {
    const interval = setInterval(() => {
      try {
        const stored = JSON.parse(localStorage.getItem('thread:planted') || 'null');
        if (stored && stored.length !== planted.length) setPlanted(stored);
      } catch {}
    }, 1000);
    return () => clearInterval(interval);
  }, [planted.length]);

  // Seed planted into localStorage on first run so Writer picks them up
  React.useEffect(() => {
    if (!localStorage.getItem('thread:planted')) {
      localStorage.setItem('thread:planted', JSON.stringify(window.SEED_PLANTED));
    }
  }, []);

  // Edit-mode protocol
  React.useEffect(() => {
    const handler = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  // Persist tweaks
  React.useEffect(() => {
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: config }, '*');
  }, [config]);

  const pal = window.PALETTES[config.palette] || window.PALETTES.cream;
  const acc = window.ACCENTS[config.accent] || window.ACCENTS.kraft;

  const theme = {
    paper: pal.paper,
    paperAlt: pal.paperAlt,
    paperWarm: pal.paperWarm,
    accent: acc.light,
    accentDeep: acc.deep,
    displayFont: config.displayFont,
  };

  const ink = window.INK;

  return (
    <div style={{
      minHeight: '100vh',
      background: theme.paper, backgroundImage: window.PAPER_GRAIN,
      fontFamily: "'Lora', Georgia, serif", color: ink.deep,
      padding: '20px 16px 80px',
    }}>
      <Nav theme={theme} screen={screen} setScreen={setScreen} displayFont={config.displayFont} onSettings={() => setTweaksOpen(true)} />

      <main style={{ maxWidth: 640, margin: '0 auto' }}>
        {screen === 'write' && (
          <window.Writer theme={theme} />
        )}
        {screen === 'calendar' && (
          <window.CalendarScreen theme={theme} entries={entries}
            onOpenEntry={setReaderEntry} />
        )}
        {screen === 'garden' && (
          <window.GardenScreen theme={theme} planted={planted} />
        )}
      </main>

      {readerEntry && <EntryReader entry={readerEntry} theme={theme} onClose={() => setReaderEntry(null)} />}

      <window.TweaksPanel
        config={config} setConfig={setConfig}
        open={tweaksOpen} onClose={() => setTweaksOpen(false)}
      />
    </div>
  );
}

function Nav({ theme, screen, setScreen, displayFont, onSettings }) {
  const ink = window.INK;
  const items = [
    { id: 'write',    label: 'Write',    icon: window.PenIcon },
    { id: 'calendar', label: 'Pages',    icon: window.CalendarIcon },
    { id: 'garden',   label: 'Garden',   icon: window.GardenIcon },
  ];
  const hasKey = !!localStorage.getItem('thread:gemini_key');
  return (
    <nav style={{
      maxWidth: 720, margin: '0 auto 28px',
      display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      paddingBottom: 14,
    }}>
      <div style={{
        fontFamily: `'${displayFont}', 'Caveat', cursive`,
        fontSize: 26, color: ink.deep, letterSpacing: '0.01em',
        fontWeight: displayFont === 'Lora' || displayFont === 'Fraunces' ? 500 : 400,
      }}>
        Thread
      </div>
      <div style={{ display: 'flex', gap: 18, alignItems: 'center' }}>
        {items.map(it => {
          const active = screen === it.id;
          const Icon = it.icon;
          return (
            <button key={it.id} onClick={() => setScreen(it.id)}
              style={{
                background: 'transparent', border: 'none', cursor: 'pointer',
                padding: '4px 2px', display: 'flex', flexDirection: 'column',
                alignItems: 'center', gap: 2,
              }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <Icon size={16} color={active ? ink.deep : ink.soft} />
                <span style={{
                  fontFamily: "'Lora', serif",
                  fontSize: 14,
                  color: active ? ink.deep : ink.soft,
                  fontWeight: active ? 500 : 400,
                  letterSpacing: '0.02em',
                }}>
                  {it.label}
                </span>
              </div>
              {active
                ? <window.StitchUnderline color={theme.accentDeep} width={44} />
                : <div style={{ height: 4, marginTop: 4 }} />
              }
            </button>
          );
        })}
        <button onClick={onSettings} title="Settings"
          style={{
            background: 'transparent', border: 'none', cursor: 'pointer',
            padding: '4px 2px', display: 'flex', flexDirection: 'column',
            alignItems: 'center', gap: 2, position: 'relative',
          }}>
          <window.SettingsIcon size={16} color={ink.soft} />
          {!hasKey && (
            <div style={{
              position: 'absolute', top: 0, right: 0,
              width: 6, height: 6, borderRadius: '50%',
              background: '#B57E72',
            }} />
          )}
        </button>
      </div>
    </nav>
  );
}

function EntryReader({ entry, theme, onClose }) {
  const ink = window.INK;
  return (
    <div onClick={onClose}
      style={{
        position: 'fixed', inset: 0, background: 'rgba(61,46,38,0.3)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        padding: 24, zIndex: 40, animation: 'fadeIn 0.2s ease-out',
      }}>
      <div onClick={e => e.stopPropagation()}
        style={{
          background: theme.paper, border: `1.5px dashed ${theme.accent}`, borderRadius: 3,
          padding: '32px 32px 28px', maxWidth: 520, width: '100%',
          maxHeight: '85vh', overflow: 'auto', position: 'relative',
          boxShadow: '0 10px 40px rgba(61,46,38,0.2)',
          animation: 'fadeInUp 0.3s ease-out',
        }}>
        <window.StitchedCorners color={theme.accent} />
        <button onClick={onClose}
          style={{
            position: 'absolute', top: 14, right: 18,
            background: 'transparent', border: 'none', cursor: 'pointer',
            color: ink.faint, fontSize: 18,
          }}>✕</button>
        <div style={{ textAlign: 'center', marginBottom: 6 }}>
          <div style={{ fontFamily: "'Caveat', cursive", fontSize: 22, color: ink.soft }}>
            {window.formatDate(entry.date)}
          </div>
        </div>
        <div style={{ marginBottom: 18 }}>
          <window.HandDivider color={theme.accent} width={80} />
        </div>
        <div style={{
          fontFamily: "'Lora', serif", fontSize: 16.5, lineHeight: 1.8,
          color: ink.deep, whiteSpace: 'pre-wrap',
        }}>
          {entry.excerpt}
        </div>
        <div style={{ marginTop: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 12 }}>
          <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
            <div style={{ width: 10, height: 10, borderRadius: '50%', background: window.MOOD_COLORS[entry.mood] }}/>
            <span style={{ fontFamily: "'Caveat', cursive", fontSize: 16, color: ink.soft }}>{entry.mood}</span>
          </div>
          <span style={{ color: theme.accent }}>·</span>
          <span style={{ fontFamily: "'Caveat', cursive", fontSize: 14, color: ink.faint }}>
            level {entry.level}
          </span>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>

</body>
</html>
